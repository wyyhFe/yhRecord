# 本地开发环境：只跑 Milvus 一套（etcd + minio + standalone）
# MySQL / Redis 你本地已有就别在这里起，避免冲突
#
# 用法：
#   启动：  docker compose -f docker-compose.dev.yml up -d
#   关闭：  docker compose -f docker-compose.dev.yml down
#   清空：  docker compose -f docker-compose.dev.yml down -v   (会删 ./dev-data 数据)
#   看状态：docker compose -f docker-compose.dev.yml ps

services:
  milvus-etcd:
    container_name: dev-milvus-etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
    volumes:
      - ./dev-data/etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-minio:
    container_name: dev-milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - ./dev-data/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "9001:9001"   # MinIO 控制台 http://localhost:9001 (admin/admin)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-standalone:
    container_name: dev-milvus-standalone
    image: milvusdb/milvus:v2.4.4
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: dev-milvus-etcd:2379
      MINIO_ADDRESS: dev-milvus-minio:9000
    volumes:
      - ./dev-data/milvus:/var/lib/milvus
    ports:
      - "19530:19530"   # Spring AI 连这个
      - "9091:9091"     # Milvus 健康检查/metrics
    depends_on:
      - milvus-etcd
      - milvus-minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3

  # 可视化 UI，不需要可以注释掉
  milvus-attu:
    container_name: dev-milvus-attu
    image: zilliz/attu:latest
    environment:
      - MILVUS_URL=dev-milvus-standalone:19530
    ports:
      - "8000:3000"   # 浏览器打开 http://localhost:8000 看 collection
    depends_on:
      - milvus-standalone
