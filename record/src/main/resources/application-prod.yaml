    # 生产 MySQL 连接地址。
    url: ${DB_URL:jdbc:mysql://123.207.210.150:3306/life_record?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
    # 生产数据库用户名。
