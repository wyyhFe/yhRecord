# 生产环境配置。
# 生产环境不要在仓库内保留真实密钥，统一通过环境变量注入。

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://123.207.210.150:3306/life_record?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 123.207.210.150
      port: 6379
      password: ${REDIS_PASSWORD}
      database: 0
      timeout: 3s
  ai:
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: never

# 日志由 logback-spring.xml 全权管理（appender、格式、滚动策略）。
# 这里只保留级别控制。
logging:
  level:
    root: INFO
    com.record: INFO
    # SqlLogInterceptor 输出的 [sql] 日志（定制 logger 名，非包路径）
    com.record.sql: INFO
    org.springframework: WARN
    org.springframework.web: WARN
