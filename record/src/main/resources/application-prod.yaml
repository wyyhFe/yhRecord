# 生产环境配置。
# 生产环境不要在仓库内保留真实密钥，统一通过环境变量注入。

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://123.207.210.150:3306/life_record?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:wyh20040118}
      database: ${REDIS_DATABASE:0}
      timeout: 3s
  ai:
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: never

# 生产环境日志配置：
#   - 默认写入 ./logs/record.log（相对当前工作目录），可用 LOG_FILE 环境变量覆盖
#   - 同时仍然往 stdout 输出，docker logs / systemd journal 都能看到
#   - 按 10MB 切分一个文件，保留 14 份，总不超过 1GB
#   - 排查问题：tail -f $LOG_FILE 或 docker logs -f <容器名>
logging:
  file:
    name: ${LOG_FILE:./logs/record.log}
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{40} - %msg%n"
    console: "%d{HH:mm:ss.SSS} %-5level [%thread] %logger{40} - %msg%n"
  level:
    root: INFO
    com.record: INFO
    # SQL 语句默认不输出，需要排查时改成 DEBUG（注意会很啰嗦）
    com.record.modules: INFO
    org.springframework.web: WARN
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 14
      total-size-cap: 1GB
