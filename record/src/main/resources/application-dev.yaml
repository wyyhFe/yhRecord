# 开发环境配置。
# 本地调试时可以直接依赖默认值启动，敏感信息优先由环境变量覆盖。

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://123.207.210.150:3306/life_record?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      timeout: 3s
  ai:
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always

logging:
  level:
    org.apache.ibatis: warn
    org.mybatis: warn
    org.mybatis.spring: warn
    com.record.modules.tag.mapper: debug
