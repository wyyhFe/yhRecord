# 项目公共配置。
#  双仓库初始化
# 这里存放所有环境共用的默认值，生产环境优先通过环境变量覆盖。
server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

logging:
  charset:
    console: UTF-8
    file: UTF-8

spring:
  application:
    name: record
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  ai:
    # spring.ai.openai.api-key / base-url / chat.options.model 由 AiProviderEnvironmentPostProcessor
    # 按 app.ai.active 动态注入，这里只保留与供应商无关的固定参数。
    openai:
      chat:
        options:
          temperature: 0.2
          max-tokens: 1200
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: never
    vectorstore:
      milvus:
        client:
          host: ${MILVUS_HOST:127.0.0.1}
          port: 19530
          username: root
          password: milvus
        databaseName: default
        collectionName: knowledge_chunk_vector
        embeddingDimension: 1536
        indexType: IVF_FLAT
        metricType: COSINE
        initialize-schema: true

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: assign_id

app:
  security:
    jwt:
      issuer: life-record
      secret: ${APP_JWT_SECRET:change-me-change-me-change-me-change-me}
      access-token-expire-minutes: 240
      refresh-token-expire-days: 30
    # 启动时自动挂 admin 角色的 userId 列表（解决首个 admin 鸡生蛋问题）
    # 用法：把你自己的 userId 填进来，应用启动会自动 INSERT sys_user_role；已是 admin 的会跳过
    bootstrap-admin-user-ids: 2062899819403370498
  wechat:
    app-id: ${WECHAT_APP_ID:wxc881594b9650474f}
    app-secret: ${WECHAT_APP_SECRET:dc5e4819af366f49a71214eda8b28015}
    code2session-url: https://api.weixin.qq.com/sns/jscode2session
  oauth:
