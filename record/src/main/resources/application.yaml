# 项目公共配置。
#  双仓库初始化
# 这里存放所有环境共用的默认值，生产环境优先通过环境变量覆盖。
server:
  port: 8080

spring:
  application:
    name: record
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  ai:
    openai:
      base-url: ${AI_BASE_URL:https://api.openai.com}
      api-key: ${AI_API_KEY:}
      chat:
        options:
          model: ${AI_CHAT_MODEL:gpt-4o-mini}
          temperature: ${AI_CHAT_TEMPERATURE:0.2}
          max-tokens: ${AI_CHAT_MAX_TOKENS:1200}
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: ${AI_CHAT_MEMORY_INIT_SCHEMA:never}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id

app:
  security:
    jwt:
      issuer: life-record
      secret: ${APP_JWT_SECRET:change-me-change-me-change-me-change-me}
      access-token-expire-minutes: 120
      refresh-token-expire-days: 30
  wechat:
    app-id: ${WECHAT_APP_ID:wxc881594b9650474f}
    app-secret: ${WECHAT_APP_SECRET:dc5e4819af366f49a71214eda8b28015}
    code2session-url: https://api.weixin.qq.com/sns/jscode2session
  map:
    provider: tencent
    api-key: ${TENCENT_MAP_API_KEY:DWUBZ-T4VKJ-7XCFD-XLNNS-SLNVF-JKBFJ}
    reverse-geocode-url: https://apis.map.qq.com/ws/geocoder/v1/
  file:
    max-size-mb: 50
    allowed-image-suffixes:
      - jpg
      - jpeg
      - png
      - webp
    allowed-video-suffixes:
      - mp4
      - mov
      - m4v
    allowed-path-prefixes:
      - diary/
      - ledger/
      - avatar/
  reminder:
    mini-program:
      token-url: https://api.weixin.qq.com/cgi-bin/token
      send-url: https://api.weixin.qq.com/cgi-bin/message/subscribe/send
      diary-template-id: ${MP_DIARY_TEMPLATE_ID:92IzmSxsaJOMB3wn3aBoq1iMd13BnnocRgviQDr9CB0}
      ledger-template-id: ${MP_LEDGER_TEMPLATE_ID:yU7oLAS9IHfH6AAhBS3vQ2h3oAN1cg_sSyO3xIdi4zc}
      ledger-monthly-template-id: ${MP_LEDGER_MONTHLY_TEMPLATE_ID:XrzRcRmTmZ8qV-QS8_MmJGfRjnmmI5fIBMDYE-Sp4tk}
      memorial-template-id: ${MP_MEMORIAL_TEMPLATE_ID:fcH_35MlCXOIOVVX130DlfckwMLuwz74OnZxLwV4Z7k}
      diary-page: ${MP_DIARY_PAGE:pages/diary/index}
      ledger-page: ${MP_LEDGER_PAGE:pages/ledger/index}
      ledger-monthly-page: ${MP_LEDGER_MONTHLY_PAGE:pages/ledger/index}
      memorial-page: ${MP_MEMORIAL_PAGE:pages/memory/index}
      state: ${MP_MESSAGE_STATE:formal}
      lang: ${MP_MESSAGE_LANG:zh_CN}
      diary-fields:
        title-field: ${MP_DIARY_TITLE_FIELD:thing1}
        content-field: ${MP_DIARY_CONTENT_FIELD:thing2}
        date-field: ${MP_DIARY_DATE_FIELD:date3}
      ledger-fields:
        time-field: ${MP_LEDGER_TIME_FIELD:time1}
        content-field: ${MP_LEDGER_CONTENT_FIELD:thing3}
        today-expense-field: ${MP_LEDGER_TODAY_EXPENSE_FIELD:amount15}
        today-income-field: ${MP_LEDGER_TODAY_INCOME_FIELD:amount17}
        total-expense-field: ${MP_LEDGER_TOTAL_EXPENSE_FIELD:amount5}
      ledger-monthly-fields:
        book-name-field: ${MP_LEDGER_MONTHLY_BOOK_NAME_FIELD:thing5}
        month-field: ${MP_LEDGER_MONTHLY_MONTH_FIELD:thing3}
        last-month-expense-field: ${MP_LEDGER_MONTHLY_EXPENSE_FIELD:amount1}
        last-month-income-field: ${MP_LEDGER_MONTHLY_INCOME_FIELD:amount2}
        remark-field: ${MP_LEDGER_MONTHLY_REMARK_FIELD:thing4}
      memorial-fields:
        time-field: ${MP_MEMORIAL_TIME_FIELD:time2}
        remark-field: ${MP_MEMORIAL_REMARK_FIELD:thing4}
        name-field: ${MP_MEMORIAL_NAME_FIELD:thing5}
    official-account:
      app-id: ${OA_APP_ID:wxe0b2c126bb08961c}
      app-secret: ${OA_APP_SECRET:7c7db12875ab6c4eafabf87d66bf6dd8}
      token-url: https://api.weixin.qq.com/cgi-bin/token
      send-url: https://api.weixin.qq.com/cgi-bin/message/template/send
      diary-template-id: ${OA_DIARY_TEMPLATE_ID:}
      ledger-template-id: ${OA_LEDGER_TEMPLATE_ID:}
      ledger-monthly-template-id: ${OA_LEDGER_MONTHLY_TEMPLATE_ID:}
      memorial-template-id: ${OA_MEMORIAL_TEMPLATE_ID:}
      diary-fields:
        title-field: ${OA_DIARY_TITLE_FIELD:thing1}
        content-field: ${OA_DIARY_CONTENT_FIELD:thing2}
        date-field: ${OA_DIARY_DATE_FIELD:date3}
      ledger-fields:
        time-field: ${OA_LEDGER_TIME_FIELD:time1}
        content-field: ${OA_LEDGER_CONTENT_FIELD:thing3}
        today-expense-field: ${OA_LEDGER_TODAY_EXPENSE_FIELD:amount15}
        today-income-field: ${OA_LEDGER_TODAY_INCOME_FIELD:amount17}
        total-expense-field: ${OA_LEDGER_TOTAL_EXPENSE_FIELD:amount5}
      ledger-monthly-fields:
        book-name-field: ${OA_LEDGER_MONTHLY_BOOK_NAME_FIELD:thing5}
        month-field: ${OA_LEDGER_MONTHLY_MONTH_FIELD:thing3}
        last-month-expense-field: ${OA_LEDGER_MONTHLY_EXPENSE_FIELD:amount1}
        last-month-income-field: ${OA_LEDGER_MONTHLY_INCOME_FIELD:amount2}
        remark-field: ${OA_LEDGER_MONTHLY_REMARK_FIELD:thing4}
      memorial-fields:
        time-field: ${OA_MEMORIAL_TIME_FIELD:time2}
        remark-field: ${OA_MEMORIAL_REMARK_FIELD:thing4}
        name-field: ${OA_MEMORIAL_NAME_FIELD:thing5}
  ai:
    enabled: ${APP_AI_ENABLED:false}
    provider: ${APP_AI_PROVIDER:openai-compatible}
    system-prompt: ${APP_AI_SYSTEM_PROMPT:你是生活记录助手，负责聊天、账单总结和消费分析。回答需要准确、克制，不编造账单数据。}
    chat:
      memory-enabled: ${APP_AI_CHAT_MEMORY_ENABLED:true}
      max-messages: ${APP_AI_CHAT_MAX_MESSAGES:20}
    bill-analysis:
      max-entries: ${APP_AI_BILL_ANALYSIS_MAX_ENTRIES:200}
      default-days: ${APP_AI_BILL_ANALYSIS_DEFAULT_DAYS:30}
      system-prompt: ${APP_AI_BILL_ANALYSIS_SYSTEM_PROMPT:你是专业账单分析助手。你只能基于用户提供的账单数据做总结、分类观察、风险提示和建议，不能捏造金额、趋势和交易记录。}

#  你现在至少需要准备这些环境变量：
#
#  APP_AI_ENABLED=true
#  AI_API_KEY=你的key
#  AI_BASE_URL=https://api.openai.com
#  AI_CHAT_MODEL=gpt-4o-mini

alioss:
  endpoint: ${ALIOSS_ENDPOINT:oss-cn-hangzhou.aliyuncs.com}
  bucket-name: ${ALIOSS_BUCKET_NAME:wyhosskey}
  access-key-id: ${ALIOSS_ACCESS_KEY_ID:your-access-key-id}
  access-key-secret: ${ALIOSS_ACCESS_KEY_SECRET:your-access-key-secret}
