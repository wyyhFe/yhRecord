# 项目公共配置。
#  双仓库初始化
# 这里存放所有环境共用的默认值，生产环境优先通过环境变量覆盖。
server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

logging:
  charset:
    console: UTF-8
    file: UTF-8

spring:
  application:
    name: record
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  ai:
    openai:
      api-key: ${AI_API_KEY}
      base-url: ${AI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.2
          max-tokens: 1200
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: never

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: assign_id

app:
  security:
    jwt:
      issuer: life-record
      secret: ${APP_JWT_SECRET:change-me-change-me-change-me-change-me}
      access-token-expire-minutes: 120
      refresh-token-expire-days: 30
  wechat:
    app-id: ${WECHAT_APP_ID:wxc881594b9650474f}
    app-secret: ${WECHAT_APP_SECRET:dc5e4819af366f49a71214eda8b28015}
    code2session-url: https://api.weixin.qq.com/sns/jscode2session
  map:
    provider: tencent
    api-key: ${TENCENT_MAP_API_KEY:DWUBZ-T4VKJ-7XCFD-XLNNS-SLNVF-JKBFJ}
    reverse-geocode-url: https://apis.map.qq.com/ws/geocoder/v1/
  file:
    max-size-mb: 50
    allowed-image-suffixes:
      - jpg
      - jpeg
      - png
      - webp
    allowed-video-suffixes:
      - mp4
      - mov
      - m4v
    allowed-path-prefixes:
      - diary/
      - ledger/
      - avatar/
  reminder:
    mini-program:
      token-url: https://api.weixin.qq.com/cgi-bin/token
      send-url: https://api.weixin.qq.com/cgi-bin/message/subscribe/send
      diary-template-id: 92IzmSxsaJOMB3wn3aBoq1iMd13BnnocRgviQDr9CB0
      ledger-template-id: yU7oLAS9IHfH6AAhBS3vQ2h3oAN1cg_sSyO3xIdi4zc
      ledger-monthly-template-id: XrzRcRmTmZ8qV-QS8_MmJGfRjnmmI5fIBMDYE-Sp4tk
      memorial-template-id: fcH_35MlCXOIOVVX130DlfckwMLuwz74OnZxLwV4Z7k
      diary-page: pages/diary/index
      ledger-page: pages/ledger/index
      ledger-monthly-page: pages/ledger/index
      memorial-page: pages/memory/index
      state: formal
      lang: zh_CN
      diary-fields:
        title-field: thing1
