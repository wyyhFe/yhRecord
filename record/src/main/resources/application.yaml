    # 各供应商端点配置。base-url / chat-model / embedding-model 没填的会用 AiProvider 枚举内置默认值。
    providers:
      openai:
        api-key: ${OPENAI_API_KEY:}
      zhipu:
        api-key: ${ZHIPU_API_KEY:}
      deepseek:
        api-key: ${DEEPSEEK_API_KEY:}
      dashscope:
        api-key: ${DASHSCOPE_API_KEY:}
    system-prompt:
    chat:
      memory-enabled: true
      max-messages: 20
    bill-analysis:
      max-entries: 200
      default-days: 30
      system-prompt:
    rag:
      enabled: true
      top-k: 5
      similarity-threshold: 0.65
      chunk-size: 600
      chunk-overlap: 100
      embedding-dimension: 1536

alioss:
  endpoint: ${ALIOSS_ENDPOINT:oss-cn-hangzhou.aliyuncs.com}
  bucket-name: ${ALIOSS_BUCKET_NAME:wyhosskey}
  access-key-id: ${ALIOSS_ACCESS_KEY_ID}
  access-key-secret: ${ALIOSS_ACCESS_KEY_SECRET}
