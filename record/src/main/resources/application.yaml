        last-month-expense-field: amount1
        last-month-income-field: amount2
        remark-field: thing4
      memorial-fields:
        time-field: time2
        remark-field: thing4
        name-field: thing5
    official-account:
      app-id: ${OA_APP_ID:wxe0b2c126bb08961c}
      app-secret: ${OA_APP_SECRET:7c7db12875ab6c4eafabf87d66bf6dd8}
      token-url: https://api.weixin.qq.com/cgi-bin/token
      send-url: https://api.weixin.qq.com/cgi-bin/message/template/send
      diary-template-id:
      ledger-template-id:
      ledger-monthly-template-id:
      memorial-template-id:
      diary-fields:
        title-field: thing1
        content-field: thing2
        date-field: date3
      ledger-fields:
        time-field: time1
